<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CP Therapeutics</title>
<meta name="description" content="CP Therapeutics — advancing new approaches to hearing preservation." />
<meta name="robots" content="noindex, nofollow" />
<link rel="icon" href="favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  :root{
    --bg:#FFFFFF;
    --ink:#16282C;
    --muted:#5E6E70;
    --faint:#9AA6A7;
    --accent:#169E92;
    --hairline:rgba(22,40,44,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:var(--bg);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    display:flex;
    flex-direction:column;
    min-height:100%;
  }
  .stage{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2rem;
  }
  .lockup{
    text-align:center;
    width:100%;
    max-width:560px;
  }
  .logo{
    width:86%;
    max-width:480px;
    height:auto;
    display:block;
    margin:0 auto;
  }
  .contact{
    margin-top:3rem;
    font-size:0.86rem;
    letter-spacing:0.02em;
    color:var(--faint);
  }
  .contact a{
    color:var(--ink);
    text-decoration:none;
    border-bottom:1px solid var(--hairline);
    padding-bottom:2px;
    transition:color .18s ease,border-color .18s ease;
  }
  .contact a:hover,
  .contact a:focus-visible{
    color:var(--accent);
    border-color:var(--accent);
  }
  .contact a:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:4px;
    border-radius:2px;
  }
  footer{
    text-align:center;
    padding:1.6rem 2rem 2.4rem;
    font-size:0.72rem;
    letter-spacing:0.06em;
    color:var(--faint);
  }
</style>
</head>
<body>
  <main class="stage">
    <div class="lockup">
      <img class="logo" src="logo.png" alt="CP Therapeutics — advancing new approaches to hearing preservation" />
      <p class="contact">
        <a href="mailto:founder@cptherapeutics.co.uk">founder@cptherapeutics.co.uk</a>
      </p>
    </div>
  </main>
  <footer>
    &copy; 2026 CP Therapeutics Ltd &middot; United Kingdom
  </footer>
</body>
</html>
